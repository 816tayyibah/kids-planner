<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── Loading Screen ── -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <span>Loading Kids Planner…</span>
</div>

<!-- ── Auth Screen ── -->
<div id="authScreen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">🌟</div>
    <h1 class="auth-title">Kids Planner</h1>
    <p class="auth-subtitle">Sign in to access your family's personalised daily planner</p>
    <button class="google-btn" id="googleSignInBtn">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
    <p class="auth-error" id="authError">Sign-in failed. Please try again.</p>
  </div>
</div>

<!-- ── App Screen ── -->
<div id="appScreen" style="display:none">

  <!-- Header -->
  <header class="app-header">
    <div class="app-header-left">
      <span class="app-logo-sm">🌟</span>
      <span class="app-title-sm">Kids Planner</span>
      <span class="sync-dot" id="syncDot" title="Data saved"></span>
    </div>
    <div class="user-info">
      <div class="user-avatar-placeholder" id="userAvatarPlaceholder"></div>
      <img class="user-avatar" id="userAvatar" src="" alt="" style="display:none" />
      <span class="user-name" id="userName"></span>
      <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
      <button id="installAppBtn" style="display:none">Install App</button>
    </div>
  </header>

  <!-- Selectors bar -->
  <div class="selectors-bar">
    <div id="childManager"></div>
    <div class="selector-row">
      <span class="selector-label">Child</span>
      <div id="childSelector"></div>
    </div>
    <div class="selector-row">
      <span class="selector-label">Day</span>
      <div id="daySelector"></div>
    </div>
    <div class="selector-row">
      <span class="selector-label">View</span>
      <div id="viewSelector"></div>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-chip">⭐ <span id="starCount">0</span> stars</div>
    <div class="stat-chip badges">🏅 <span id="badgeCount">0</span> badges</div>
    <div class="stat-chip date" id="todayLabel"></div>
    <button class="reset-btn-small" id="resetProgressBtn">Reset</button>
  </div>

  <!-- Panels -->
  <div class="panel" id="scheduleView"></div>
  <div class="panel" id="checklistView"></div>
  <div class="panel" id="starsView"></div>

  <!-- Schedule editor modal -->
  <div id="scheduleEditorModal" hidden>
    <div class="modal-overlay" data-close-editor="true">
      <div class="modal-box" role="dialog" aria-modal="true">
        <div class="modal-header">
          <h2 id="editorModalTitle">Edit Schedule</h2>
          <button class="modal-close" id="closeScheduleEditorBtn" aria-label="Close">✕</button>
        </div>
        <div id="editorDaySelector"></div>
        <div id="scheduleEditorContent"></div>
      </div>
    </div>
  </div>

</div><!-- end #appScreen -->

<!-- ── HTML Templates ── -->
<template id="scheduleItemTemplate">
  <div class="schedule-item">
    <span class="time-chip"></span>
    <div class="schedule-text"><h3></h3><p></p></div>
    <button class="mini-star" type="button"></button>
  </div>
</template>

<template id="taskItemTemplate">
  <label class="task-item">
    <input type="checkbox" />
    <div><strong></strong><small></small></div>
    <span class="task-points"></span>
  </label>
</template>

<!-- ── Firebase + App Script ── -->
<!-- NOTE: type="module" is required for Firebase ES module imports -->
<script src="app.js" type="module"></script>



</body>
</html>
